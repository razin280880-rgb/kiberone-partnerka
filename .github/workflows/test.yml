name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Syntax check (node --check)
        run: |
          for f in functions/_lib/*.js functions/api/*.js functions/api/**/*.js assets/js/*.js; do
            node --check "$f"
          done

      - name: Run Vitest
        run: npm test -- --reporter=verbose
