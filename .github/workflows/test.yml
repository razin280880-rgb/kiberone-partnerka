name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Syntax check (node --check)
        run: |
          for f in functions/_lib/*.js functions/api/*.js functions/api/**/*.js assets/js/*.js; do
            node --check "$f"
          done

      - name: Run Vitest
        run: npm test -- --reporter=verbose

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python (для static-сервера)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install npm
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright (chromium)
        run: npx playwright test --project=chromium --reporter=list

      - name: Upload trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
