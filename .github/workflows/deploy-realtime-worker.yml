name: Deploy realtime-worker

on:
  push:
    branches: [main]
    paths:
      - 'realtime-worker/**'
      - '.github/workflows/deploy-realtime-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: realtime-worker/package-lock.json

      - name: Install
        working-directory: realtime-worker
        run: npm ci

      - name: Test
        working-directory: realtime-worker
        run: npm test

      - name: Deploy via Wrangler
        working-directory: realtime-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
