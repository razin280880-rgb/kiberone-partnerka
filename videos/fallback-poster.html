<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Видео-приветствие — скоро</title>
  <style>
    body { margin: 0; background: linear-gradient(135deg, #6B2FB5 0%, #1A1A2E 100%); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    .box { max-width: 380px; }
    .emoji { font-size: 4rem; margin-bottom: 16px; }
    h1 { font-size: 1.5rem; margin-bottom: 12px; }
    p { font-size: 1rem; opacity: 0.9; line-height: 1.5; }
    a { color: #FFD43B; font-weight: 700; }
  </style>
</head>
<body>
  <div class="box">
    <div class="emoji">🎥</div>
    <h1>Видео скоро будет!</h1>
    <p>
      Сейчас мы снимаем персональные приветствия от тьюторов в каждом городе.<br><br>
      А пока — <strong>возьмите жетон из куба</strong> и приходите на пробный урок. Жетон даёт приз в 2 раза ценнее на ресепшене.
    </p>
  </div>
</body>
</html>
